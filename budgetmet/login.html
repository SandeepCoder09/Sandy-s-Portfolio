<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BudgetMate — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sacramento&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/shared.css" />
    <link rel="stylesheet" href="../budgetmet/login.css"
  </head>
  <body>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="auth-left">
      <div class="left-brand">
        <div class="app-icon">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"
            />
          </svg>
        </div>
        <h2>Budget<span>Mate</span></h2>
        <p>Smart finance tracking, simplified.</p>
      </div>
      <div class="feature-list">
        <div class="feature-item">
          <div class="feat-dot">
            <svg viewBox="0 0 24 24">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
          </div>
          <p>Track income &amp; expenses in real time</p>
        </div>
        <div class="feature-item">
          <div class="feat-dot">
            <svg viewBox="0 0 24 24">
              <path d="M18 20V10M12 20V4M6 20v-6" />
            </svg>
          </div>
          <p>Visual charts and financial summaries</p>
        </div>
        <div class="feature-item">
          <div class="feat-dot">
            <svg viewBox="0 0 24 24">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
          </div>
          <p>Secure, private, and always available</p>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-right-inner fade-up">
        <h3>Welcome back</h3>
        <p class="sub">Sign in to your BudgetMate account.</p>
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="you@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="pass-wrap">
              <input
                type="password"
                id="password"
                placeholder="Your password"
                required
              />
              <button
                type="button"
                class="pass-toggle"
                onclick="togglePass('password')"
              >
                <svg viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <div class="forgot-row"><a href="#">Forgot password?</a></div>
          <button type="submit" class="btn-primary btn-full btn-lg">
            Sign In
          </button>
        </form>
        <p
          style="
            text-align: center;
            margin-top: 20px;
            font-size: 13.5px;
            color: var(--muted);
          "
        >
          No account?
          <a
            href="../budgetmet/register.html"
            style="color: var(--orange); font-weight: 600"
            >Create one →</a
          >
        </p>
        <p
          style="
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: var(--muted);
          "
        >
          <a href="/index.html" style="color: var(--muted)"
            >← Back to Sandy's Portfolio</a
          >
        </p>
      </div>
    </div>

    <script src="../shared/shared.js"></script>
    <script>
      function togglePass(id) {
        const i = document.getElementById(id);
        i.type = i.type === "password" ? "text" : "password";
      }
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
