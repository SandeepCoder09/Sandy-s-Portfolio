<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BudgetMate — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sacramento&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/shared.css" />
    <link rel="stylesheet" href="../budgetmet/register.css" />
  </head>
  <body>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="reg-wrap fade-up">
      <div class="reg-brand">
        <div class="app-icon">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"
            />
            <path d="M12 8v4l3 3" />
          </svg>
        </div>
        <h2>Budget<span>Mate</span></h2>
      </div>

      <div class="reg-card">
        <h3>Create your account</h3>
        <p class="sub">Start tracking your finances today.</p>
        <form id="regForm">
          <div class="name-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" placeholder="Alex" required />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" placeholder="Rivera" required />
            </div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="you@email.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="pass-wrap">
              <input
                type="password"
                id="regPass"
                placeholder="Create a strong password"
                required
                oninput="checkStrength(this.value)"
              />
              <button
                type="button"
                class="pass-toggle"
                onclick="togglePass('regPass')"
              >
                <svg viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <p class="strength-label" id="strengthLabel">Enter a password</p>
          </div>
          <button type="submit" class="btn-primary btn-full btn-lg">
            Create Account
          </button>
        </form>
        <p
          style="
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: var(--muted);
          "
        >
          Already have an account?
          <a href="login.html" style="color: var(--orange); font-weight: 600"
            >Sign in →</a
          >
        </p>
      </div>

      <p
        style="
          text-align: center;
          margin-top: 20px;
          font-size: 12px;
          color: var(--muted);
        "
      >
        <a href="../index.html" style="color: var(--muted)"
          >← Back to Sandy's Portfolio</a
        >
      </p>
    </div>

    <script src="../shared/shared.js"></script>
    <script>
      function togglePass(id) {
        const i = document.getElementById(id);
        i.type = i.type === "password" ? "text" : "password";
      }
      function checkStrength(val) {
        const f = document.getElementById("strengthFill");
        const l = document.getElementById("strengthLabel");
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const map = [
          { w: "0%", c: "transparent", t: "Enter a password" },
          { w: "25%", c: "#EF4444", t: "Weak" },
          { w: "50%", c: "#F59E0B", t: "Fair" },
          { w: "75%", c: "#3B82F6", t: "Good" },
          { w: "100%", c: "#22C55E", t: "Strong" },
        ];
        const s = map[score];
        f.style.width = s.w;
        f.style.background = s.c;
        l.textContent = s.t;
      }
      document.getElementById("regForm").addEventListener("submit", (e) => {
        e.preventDefault();
        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
