<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful — Sandy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sacramento&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/shared.css" />
    <link rel="stylesheet" href="../payment-successful/success.css"
  </head>
  <body>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="success-wrap">
      <div class="success-card">
        <div class="success-anim">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
        </div>
        <h1>Payment <span class="script">Successful!</span></h1>
        <p>
          Your generous donation has been received. Thank you so much for
          supporting my work — it truly means the world to me. 💙
        </p>
        <div class="receipt-box">
          <div class="receipt-row">
            <span>Status</span>
            <span style="color: var(--success)">✓ Confirmed</span>
          </div>
          <div class="receipt-row">
            <span>Recipient</span>
            <span>Sandy 09</span>
          </div>
          <div class="receipt-row">
            <span>Purpose</span>
            <span>Support &amp; Donation</span>
          </div>
        </div>
        <div class="success-actions">
          <a href="../portfolio/index.html" class="btn-primary"
            >View Portfolio</a
          >
          <a href="../index.html" class="btn-ghost">Back to Home</a>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-inner">
        <a href="../index.html" class="footer-logo"
          ><img src="../assets/09logo-black.jpg" alt="Sandy"
        /></a>
        <p class="footer-copy">© 2025 Sandy · Thank you for your support 💙</p>
      </div>
    </footer>

    <script src="../shared/shared.js"></script>
  </body>
</html>
