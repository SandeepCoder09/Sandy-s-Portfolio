<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading — Sandy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sacramento&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared.css" />
    <style>
      body {
        display: flex;
        flex-direction: column;
      }
      .progress-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 48px 24px;
      }
      .progress-card {
        background: var(--dark2);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 52px 48px;
        max-width: 480px;
        width: 100%;
        text-align: center;
      }
      .prog-logo {
        margin: 0 auto 32px;
      }
      .prog-logo img {
        height: 48px;
        filter: invert(1);
        opacity: 0.8;
        margin: 0 auto;
      }
      .prog-title {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 8px;
      }
      .prog-sub {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 40px;
      }
      /* Animated progress bar */
      .prog-bar-wrap {
        margin-bottom: 12px;
      }
      .prog-bar-track {
        width: 100%;
        height: 8px;
        background: var(--dark3);
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .prog-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--orange), var(--orange-light));
        border-radius: 4px;
        width: 0%;
        transition: width 0.4s ease;
      }
      .prog-percent {
        font-size: 13px;
        font-weight: 700;
        color: var(--orange);
        text-align: right;
      }
      .prog-steps {
        text-align: left;
        margin: 28px 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .prog-step {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 14px;
        color: var(--muted);
        transition: color 0.3s;
      }
      .prog-step.done {
        color: var(--text);
      }
      .prog-step.active {
        color: var(--orange);
      }
      .step-dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        flex-shrink: 0;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        transition: all 0.3s;
      }
      .prog-step.done .step-dot {
        background: var(--success);
        border-color: var(--success);
        color: #fff;
      }
      .prog-step.active .step-dot {
        border-color: var(--orange);
        animation: spinBorder 1s linear infinite;
      }
      @keyframes spinBorder {
        to {
          box-shadow:
            0 0 0 2px var(--orange-pale),
            0 0 12px var(--orange);
        }
      }
      .prog-cta {
        margin-top: 8px;
        display: none;
      }

      @media (max-width: 480px) {
        .progress-card {
          padding: 40px 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="progress-wrap">
      <div class="progress-card">
        <div class="prog-logo">
          <img src="../assets/09logo-black.jpg" alt="Sandy Logo" />
        </div>
        <h2 class="prog-title">
          Setting things up<span style="color: var(--orange)">.</span>
        </h2>
        <p class="prog-sub" id="progMsg">Getting everything ready for you…</p>

        <div class="prog-bar-wrap">
          <div class="prog-bar-track">
            <div class="prog-bar-fill" id="progFill"></div>
          </div>
          <div class="prog-percent" id="progPct">0%</div>
        </div>

        <div class="prog-steps">
          <div class="prog-step active" id="step1">
            <div class="step-dot" id="dot1">·</div>
            <span>Initialising session</span>
          </div>
          <div class="prog-step" id="step2">
            <div class="step-dot" id="dot2">·</div>
            <span>Loading assets</span>
          </div>
          <div class="prog-step" id="step3">
            <div class="step-dot" id="dot3">·</div>
            <span>Almost there</span>
          </div>
        </div>

        <div class="prog-cta" id="progCta">
          <a href="../index.html" class="btn-primary btn-full">Continue →</a>
        </div>
      </div>
    </div>

    <script src="../shared.js"></script>
    <script>
      const fill = document.getElementById("progFill");
      const pct = document.getElementById("progPct");
      const msg = document.getElementById("progMsg");
      const cta = document.getElementById("progCta");

      const steps = [
        { id: "step1", dot: "dot1", thresh: 33, label: "Loading assets…" },
        { id: "step2", dot: "dot2", thresh: 66, label: "Almost there…" },
        { id: "step3", dot: "dot3", thresh: 100, label: "Ready!" },
      ];

      let current = 0;
      const interval = setInterval(() => {
        current = Math.min(current + Math.random() * 4 + 1, 100);
        fill.style.width = current + "%";
        pct.textContent = Math.floor(current) + "%";

        steps.forEach((s, i) => {
          const el = document.getElementById(s.id);
          const dot = document.getElementById(s.dot);
          if (current >= s.thresh) {
            el.classList.remove("active");
            el.classList.add("done");
            dot.textContent = "✓";
            if (i + 1 < steps.length) {
              document.getElementById(steps[i + 1].id).classList.add("active");
            }
            msg.textContent = s.label;
          }
        });

        if (current >= 100) {
          clearInterval(interval);
          cta.style.display = "block";
        }
      }, 80);
    </script>
  </body>
</html>
